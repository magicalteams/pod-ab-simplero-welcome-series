<!--
  Character × Substack Subscribe Popup
  =====================================
  Deliverable for Anne Benveniste / annebenven.substack.com
  Built for Magical Teams by Adam

  HOW TO INSTALL
  --------------
  1. Log into Simplero admin.
  2. Go to: Content → Website → Settings → Custom Code → Footer Scripts
     (or the equivalent "Custom Footer Scripts" section for your theme).
  3. Paste everything between the START and END markers below into that field.
  4. Save and hard-refresh the live site to test.

  BEHAVIOR
  --------
  - Appears 2 seconds after page load on every page.
  - Suppressed for 14 days after the user closes it.
  - Suppressed immediately after a successful Substack subscribe (postMessage listener).
  - Clicking the dark overlay also dismisses it.
  - Fully responsive — works on mobile.

  CUSTOMISATION
  -------------
  - DELAY_MS      : milliseconds before popup appears (default: 2000)
  - SUPPRESS_DAYS : days before re-showing after dismissal (default: 14)
  - To change copy, edit the h2 and p text inside #char-popup-modal.
-->

<!-- ==================== START PASTE HERE ==================== -->
<style>
  #char-popup-overlay {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 99999;
    background: rgba(0, 0, 0, 0.55);
    align-items: center;
    justify-content: center;
    padding: 16px;
    box-sizing: border-box;
  }

  #char-popup-overlay.char-visible {
    display: flex;
  }

  #char-popup-modal {
    position: relative;
    background: #fff;
    max-width: 500px;
    width: 100%;
    padding: 40px 36px 32px;
    box-sizing: border-box;
    text-align: center;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
  }

  #char-popup-close {
    position: absolute;
    top: 12px;
    right: 16px;
    background: none;
    border: none;
    cursor: pointer;
    font-size: 22px;
    line-height: 1;
    color: #555;
    padding: 4px 6px;
  }

  #char-popup-close:hover {
    color: #000;
  }

  #char-popup-modal h2 {
    margin: 0 0 8px;
    font-size: 22px;
    font-weight: 700;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    color: #111;
  }

  #char-popup-modal p {
    margin: 0 0 24px;
    font-size: 14px;
    line-height: 1.5;
    color: #555;
  }

  #char-popup-modal iframe {
    width: 100%;
    border: none;
    display: block;
  }

  @media (max-width: 540px) {
    #char-popup-modal {
      padding: 32px 20px 24px;
    }
  }
</style>

<div id="char-popup-overlay" role="dialog" aria-modal="true" aria-label="Subscribe to Character">
  <div id="char-popup-modal">
    <button id="char-popup-close" aria-label="Close">&#x2715;</button>
    <h2>Character</h2>
    <p>Become the artist of your life. Guidance on reimagining work,<br>finding your creative voice, and building a spiritual practice.</p>
    <iframe
      src="https://annebenven.substack.com/embed"
      height="150"
      scrolling="no"
      frameborder="0"
    ></iframe>
  </div>
</div>

<script>
(function () {
  var STORAGE_KEY   = 'char_popup_dismissed';
  var DELAY_MS      = 2000;
  var SUPPRESS_DAYS = 14;
  var SUPPRESS_MS   = SUPPRESS_DAYS * 24 * 60 * 60 * 1000;

  function isDismissed() {
    try {
      var val = localStorage.getItem(STORAGE_KEY);
      return val && (Date.now() - parseInt(val, 10)) < SUPPRESS_MS;
    } catch (e) {
      return false;
    }
  }

  function dismiss() {
    try {
      localStorage.setItem(STORAGE_KEY, String(Date.now()));
    } catch (e) {}
    var overlay = document.getElementById('char-popup-overlay');
    if (overlay) {
      overlay.classList.remove('char-visible');
    }
  }

  function show() {
    var overlay = document.getElementById('char-popup-overlay');
    if (overlay) {
      overlay.classList.add('char-visible');
    }
  }

  if (isDismissed()) return;

  setTimeout(show, DELAY_MS);

  document.getElementById('char-popup-close').addEventListener('click', dismiss);

  document.getElementById('char-popup-overlay').addEventListener('click', function (e) {
    if (e.target === this) dismiss();
  });

  // Suppress after successful Substack subscribe (iframe postMessage)
  window.addEventListener('message', function (e) {
    if (
      e.origin === 'https://annebenven.substack.com' &&
      e.data &&
      (e.data.type === 'subscribe' || e.data.type === 'subscribeSuccess')
    ) {
      dismiss();
    }
  });
}());
</script>
<!-- ===================== END PASTE HERE ===================== -->
